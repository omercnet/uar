name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: uar
          POSTGRES_PASSWORD: uar_dev_password
          POSTGRES_DB: uar
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U uar -d uar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile; pnpm rebuild esbuild sharp

      - name: Build
        run: pnpm -r build

      - name: Test
        env:
          DATABASE_URL: postgres://uar:uar_dev_password@localhost:5433/uar
        run: pnpm -r test

      - name: Lint
        run: pnpm -r lint

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: uar
          POSTGRES_PASSWORD: uar_dev_password
          POSTGRES_DB: uar
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U uar -d uar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile; pnpm rebuild esbuild sharp

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: pnpm -r build

      - name: Run e2e
        env:
          DATABASE_URL: postgres://uar:uar_dev_password@localhost:5433/uar
          CI: 'true'
          STUB_AUTHZ: 'true'
          UAR_STUB_TENANT_ID: '11111111-1111-4111-8111-111111111111'
          UAR_STUB_USER_ID: '22222222-2222-4222-8222-222222222222'
          UAR_STUB_ROLES: admin
        run: pnpm e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
